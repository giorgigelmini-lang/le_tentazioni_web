<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Agenda — Tentazioni Acconciature</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">

  <style>
    :root {
      --dark:    #1A1A1A;
      --dark-2:  #242424;
      --dark-3:  #2E2E2E;
      --gold:    #C8A97E;
      --gold-dk: #A8864E;
      --cream:   #FDFAF6;
      --green:   #4CAF7D;
      --red:     #E57373;
      --amber:   #FFB74D;
      --blue:    #64B5F6;
      --text:    #E0DDD8;
      --muted:   #7A7A7A;
      --border:  rgba(255,255,255,.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.55;
      overscroll-behavior: none;
    }

    /* ── AUTH OVERLAY ─────────────────────────── */
    .auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .auth-card {
      width: 100%; max-width: 360px;
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
    }
    .auth-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; color: var(--cream);
      margin-bottom: 6px;
    }
    .auth-logo span { color: var(--gold); }
    .auth-subtitle { font-size: .78rem; color: var(--muted); margin-bottom: 32px; }
    .auth-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(200,169,126,.12); border: 1.5px solid rgba(200,169,126,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; color: var(--gold);
      margin: 0 auto 28px;
    }
    .auth-input {
      width: 100%; background: var(--dark-3);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: 14px 16px;
      font-size: 1rem; font-family: 'Lato', sans-serif;
      text-align: center; letter-spacing: .1em;
      margin-bottom: 14px; transition: border-color .2s;
    }
    .auth-input:focus { outline: none; border-color: var(--gold); }
    .auth-btn {
      width: 100%; background: var(--gold); color: var(--dark);
      border: none; border-radius: 10px;
      padding: 14px; font-size: .92rem; font-weight: 900;
      font-family: 'Lato', sans-serif; cursor: pointer;
      text-transform: uppercase; letter-spacing: .1em;
      transition: background .2s;
    }
    .auth-btn:hover { background: var(--gold-dk); }
    .auth-error {
      font-size: .8rem; color: var(--red);
      margin-top: 10px; min-height: 18px;
    }

    /* ── APP LAYOUT ───────────────────────────── */
    .admin-app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── HEADER ───────────────────────────────── */
    .admin-header {
      background: var(--dark-2);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-back {
      color: var(--muted); text-decoration: none;
      font-size: .82rem; display: flex; align-items: center; gap: 6px;
      transition: color .2s; flex-shrink: 0;
    }
    .header-back:hover { color: var(--gold); }
    .header-title {
      flex: 1; text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--cream);
    }
    .header-logout {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: .78rem; font-family: 'Lato', sans-serif;
      display: flex; align-items: center; gap: 5px;
      transition: color .2s; flex-shrink: 0;
    }
    .header-logout:hover { color: var(--red); }

    /* ── WEEK NAV ─────────────────────────────── */
    .week-nav {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 10px;
      background: var(--dark-2);
      border-bottom: 1px solid var(--border);
    }
    .week-arrow {
      background: var(--dark-3); border: none;
      color: var(--gold); width: 36px; height: 36px;
      border-radius: 8px; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .2s;
    }
    .week-arrow:hover { background: rgba(200,169,126,.2); }
    .week-label {
      flex: 1; text-align: center;
      font-size: .82rem; color: var(--muted);
      font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    }

    /* ── DAYS STRIP ───────────────────────────── */
    .days-strip {
      display: flex; gap: 6px; overflow-x: auto;
      padding: 10px 16px 14px;
      background: var(--dark-2);
      scrollbar-width: none;
    }
    .days-strip::-webkit-scrollbar { display: none; }
    .day-btn {
      flex-shrink: 0; min-width: 52px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 8px; border-radius: 12px;
      border: 1.5px solid transparent; background: var(--dark-3);
      cursor: pointer; transition: all .18s; position: relative;
    }
    .day-btn:hover { border-color: rgba(200,169,126,.35); }
    .day-btn.active {
      background: var(--gold); border-color: var(--gold);
    }
    .day-btn.today:not(.active) { border-color: rgba(200,169,126,.5); }
    .day-btn .day-name {
      font-size: .66rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted);
    }
    .day-btn.active .day-name { color: var(--dark); }
    .day-btn .day-num {
      font-size: 1.15rem; font-weight: 900; color: var(--cream); line-height: 1;
    }
    .day-btn.active .day-num { color: var(--dark); }
    .day-btn .day-count {
      font-size: .62rem; font-weight: 700;
      background: rgba(200,169,126,.2); color: var(--gold);
      border-radius: 100px; padding: 1px 7px; min-width: 20px; text-align: center;
    }
    .day-btn.active .day-count { background: rgba(0,0,0,.2); color: var(--dark); }
    .day-btn.closed { opacity: .4; cursor: default; pointer-events: none; }

    /* ── DAY HEADER ───────────────────────────── */
    .day-header {
      padding: 18px 20px 12px;
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px;
    }
    .day-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; color: var(--cream);
    }
    .appt-count-label {
      font-size: .78rem; color: var(--muted); white-space: nowrap;
    }

    /* ── APPOINTMENTS LIST ────────────────────── */
    .appts-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

    .appt-card {
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      border-radius: 12px; padding: 16px;
      transition: border-color .2s;
    }
    .appt-card[data-stato="completato"] { border-left-color: var(--green); opacity: .75; }
    .appt-card[data-stato="annullato"]  { border-left-color: var(--red);   opacity: .5; }

    .appt-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 12px; margin-bottom: 10px;
    }
    .appt-time {
      font-size: 1.5rem; font-weight: 900; color: var(--gold);
      font-family: 'Playfair Display', serif; line-height: 1; flex-shrink: 0;
    }
    .appt-card[data-stato="completato"] .appt-time { color: var(--green); }
    .appt-card[data-stato="annullato"]  .appt-time { color: var(--muted); }

    .status-pill {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; padding: 3px 10px; border-radius: 100px;
    }
    .status-pill.confermato { background: rgba(200,169,126,.18); color: var(--gold); }
    .status-pill.completato { background: rgba(76,175,125,.18);  color: var(--green); }
    .status-pill.annullato  { background: rgba(229,115,115,.18); color: var(--red); }

    .appt-nome    { font-size: 1rem; font-weight: 700; color: var(--cream); }
    .appt-service { font-size: .85rem; color: var(--muted); margin-top: 2px; }
    .appt-phone {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .82rem; color: var(--gold);
      text-decoration: none; margin-top: 6px;
      transition: color .2s;
    }
    .appt-phone:hover { color: var(--gold-dk); }
    .appt-note {
      font-size: .8rem; color: var(--muted);
      margin-top: 6px; font-style: italic;
    }
    .appt-origine {
      font-size: .7rem; color: var(--muted);
      margin-top: 4px; display: flex; align-items: center; gap: 4px;
    }

    .appt-actions {
      display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
    }
    .appt-btn {
      flex: 1; min-width: 80px;
      padding: 8px 10px; border-radius: 8px;
      border: none; cursor: pointer; font-size: .75rem; font-weight: 700;
      font-family: 'Lato', sans-serif; text-transform: uppercase;
      letter-spacing: .06em; transition: all .18s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .appt-btn--done   { background: rgba(76,175,125,.18); color: var(--green); }
    .appt-btn--done:hover { background: rgba(76,175,125,.3); }
    .appt-btn--cancel { background: rgba(229,115,115,.12); color: var(--red); }
    .appt-btn--cancel:hover { background: rgba(229,115,115,.25); }
    .appt-btn--del    { background: rgba(255,255,255,.05); color: var(--muted); }
    .appt-btn--del:hover { background: rgba(229,115,115,.18); color: var(--red); }
    .appt-btn--wa     { background: rgba(37,211,102,.12); color: #25D166; }
    .appt-btn--wa:hover { background: rgba(37,211,102,.25); }
    .appt-btn:disabled { opacity: .4; pointer-events: none; }

    /* ── EMPTY / LOADING ──────────────────────── */
    .state-box {
      text-align: center; padding: 60px 24px;
      color: var(--muted);
    }
    .state-box i { font-size: 2.5rem; margin-bottom: 16px; display: block; opacity: .4; }
    .state-box p { font-size: .92rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(200,169,126,.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 48px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FAB ──────────────────────────────────── */
    .fab {
      position: fixed; bottom: 24px; right: 20px; z-index: 100;
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--gold); color: var(--dark);
      border: none; font-size: 1.6rem; cursor: pointer;
      box-shadow: 0 6px 24px rgba(200,169,126,.4);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .2s;
    }
    .fab:hover { background: var(--gold-dk); transform: scale(1.07); }

    /* ── MODAL ────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.6);
      display: flex; align-items: flex-end;
      backdrop-filter: blur(4px);
    }
    .modal-sheet {
      width: 100%; max-width: 560px; margin: 0 auto;
      background: var(--dark-2);
      border-radius: 20px 20px 0 0;
      padding: 0 0 env(safe-area-inset-bottom);
      max-height: 92vh; overflow-y: auto;
      animation: slideUp .3s cubic-bezier(.4,0,.2,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 12px auto 0;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--cream);
    }
    .modal-close {
      background: var(--dark-3); border: none;
      color: var(--muted); width: 32px; height: 32px;
      border-radius: 8px; cursor: pointer; font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .modal-close:hover { color: var(--red); background: rgba(229,115,115,.15); }

    /* Form */
    .modal-form { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group label {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted);
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      padding: 12px 14px; font-size: .92rem;
      font-family: 'Lato', sans-serif;
      transition: border-color .2s; width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none; border-color: var(--gold);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group select option { background: var(--dark-3); }

    .origine-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .75rem; color: var(--muted);
      background: var(--dark-3); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px;
    }
    .origine-badge strong { color: var(--gold); }

    .submit-btn {
      width: 100%; background: var(--gold); color: var(--dark);
      border: none; border-radius: 12px;
      padding: 16px; font-size: .92rem; font-weight: 900;
      font-family: 'Lato', sans-serif; cursor: pointer;
      text-transform: uppercase; letter-spacing: .08em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .2s; margin-top: 4px;
    }
    .submit-btn:hover   { background: var(--gold-dk); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── TOAST ────────────────────────────────── */
    #toast {
      position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: var(--dark-2); border: 1px solid var(--border);
      color: var(--text); padding: 12px 24px; border-radius: 100px;
      font-size: .85rem; font-weight: 700; z-index: 999;
      opacity: 0; transition: opacity .3s, transform .3s;
      white-space: nowrap; pointer-events: none;
    }
    #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: rgba(76,175,125,.25); border-color: rgba(76,175,125,.4); color: var(--green); }
    #toast.error   { background: rgba(229,115,115,.25); border-color: rgba(229,115,115,.4); color: var(--red); }

    /* ── BOTTOM PADDING (FAB clearance) ──────── */
    .appts-list { padding-bottom: 100px; }
  </style>
</head>
<body>

<!-- ══════════════════ AUTH OVERLAY ══════════════════ -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-icon"><i class="fa-solid fa-lock"></i></div>
    <p class="auth-logo">Tentazioni <span>Acconciature</span></p>
    <p class="auth-subtitle">Area riservata — Agenda</p>
    <input
      class="auth-input" type="password" id="pwdInput"
      placeholder="Password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="auth-btn" onclick="doLogin()">
      <i class="fa-solid fa-arrow-right-to-bracket"></i> Accedi
    </button>
    <p class="auth-error" id="authError"></p>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════════════ -->
<div class="admin-app" id="adminApp" style="display:none;">

  <!-- HEADER -->
  <header class="admin-header">
    <a class="header-back" href="index.html">
      <i class="fa-solid fa-chevron-left"></i> Dashboard
    </a>
    <h1 class="header-title">
      <i class="fa-regular fa-calendar-days" style="color:var(--gold); margin-right:6px;"></i>Agenda
    </h1>
    <button class="header-logout" onclick="doLogout()">
      <i class="fa-solid fa-right-from-bracket"></i> Esci
    </button>
  </header>

  <!-- WEEK NAVIGATION -->
  <div class="week-nav">
    <button class="week-arrow" onclick="changeWeek(-1)" aria-label="Settimana precedente">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <div class="week-label" id="weekLabel">—</div>
    <button class="week-arrow" onclick="changeWeek(1)" aria-label="Settimana successiva">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>

  <!-- DAYS STRIP -->
  <div class="days-strip" id="daysStrip"></div>

  <!-- SELECTED DAY HEADER -->
  <div class="day-header">
    <h2 id="selectedDayTitle">Caricamento...</h2>
    <span class="appt-count-label" id="apptCountLabel"></span>
  </div>

  <!-- APPOINTMENTS -->
  <div class="appts-list" id="apptsList"></div>

  <!-- FAB -->
  <button class="fab" onclick="openAddModal()" aria-label="Aggiungi appuntamento">
    <i class="fa-solid fa-plus"></i>
  </button>

</div>

<!-- ══════════════════ MODAL AGGIUNGI ═══════════════ -->
<div class="modal-backdrop" id="addModal" style="display:none;" onclick="onBackdropClick(event)">
  <div class="modal-sheet" role="dialog" aria-modal="true" aria-label="Nuovo appuntamento">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3><i class="fa-solid fa-calendar-plus" style="color:var(--gold); margin-right:8px;"></i>Nuovo appuntamento</h3>
      <button class="modal-close" onclick="closeAddModal()" aria-label="Chiudi">✕</button>
    </div>
    <form class="modal-form" id="addForm" onsubmit="submitAppointment(event)">

      <div class="form-group">
        <label for="f-nome">Nome cliente *</label>
        <input type="text" id="f-nome" required placeholder="Es. Maria Rossi" autocomplete="name">
      </div>

      <div class="form-group">
        <label for="f-tel">
          Telefono cliente
          <span style="font-size:.7rem; color:var(--green); margin-left:6px;">
            <i class="fa-brands fa-whatsapp"></i> per il promemoria automatico
          </span>
        </label>
        <input type="tel" id="f-tel" placeholder="349 000 0000" autocomplete="tel"
               oninput="aggiornaPreviewTel()">
        <p id="tel-preview" style="font-size:.72rem; min-height:16px; transition:color .2s;"></p>
      </div>

      <div class="form-group">
        <label for="f-servizio">Servizio</label>
        <select id="f-servizio">
          <option value="">— Nessun servizio selezionato —</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="f-data">Data *</label>
          <input type="date" id="f-data" required>
        </div>
        <div class="form-group">
          <label for="f-ora">Ora *</label>
          <input type="time" id="f-ora" required min="08:00" max="19:00" step="900">
        </div>
      </div>

      <div class="origine-badge">
        <i class="fa-solid fa-pen"></i>
        Origine: <strong>Manuale</strong>
        <span style="margin-left:auto; font-size:.7rem;">(inserito da Elisabetta)</span>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <i class="fa-solid fa-calendar-plus"></i> Aggiungi appuntamento
      </button>

      <div id="formError" style="font-size:.82rem; color:var(--red); text-align:center; min-height:18px;"></div>

    </form>
  </div>
</div>

<!-- ══════════════════ TOAST ════════════════════════ -->
<div id="toast" role="alert" aria-live="polite"></div>

<script src="assets/js/supabase.js"></script>
<script>
/* ──────────────────────────────────────────────────
   TENTAZIONI ACCONCIATURE — Agenda Admin — v2 2026-04-23
   ────────────────────────────────────────────────── */

// Cambia questa password nelle impostazioni del progetto
var ADMIN_PASSWORD = 'tentazioni2026';
var SESSION_KEY    = 'ta_admin_auth';

// ── Locali italiane ──────────────────────────────
var IT_DAYS_LONG  = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
var IT_DAYS_SHORT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
var IT_MONTHS     = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
var CLOSED_DAYS   = [0, 1]; // 0=Dom, 1=Lun

// ── Stato globale ────────────────────────────────
var currentWeekStart = getMondayOf(new Date());
var selectedDate     = todayISO();
var weekCache        = {}; // { 'YYYY-MM-DD': [appointments] }

// ── AUTH ─────────────────────────────────────────
function doLogin() {
  var pwd = document.getElementById('pwdInput').value;
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('adminApp').style.display = '';
    initAdmin();
  } else {
    var err = document.getElementById('authError');
    err.textContent = 'Password non corretta. Riprova.';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
    setTimeout(function () { err.textContent = ''; }, 3000);
  }
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('adminApp').style.display = 'none';
  document.getElementById('authOverlay').style.display = '';
  document.getElementById('pwdInput').value = '';
}

// ── DATA HELPERS ──────────────────────────────────
function getMondayOf(date) {
  var d = new Date(date);
  d.setHours(0, 0, 0, 0);
  var day = d.getDay();
  var diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function addDays(date, n) {
  var d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function toISO(date) {
  var d = new Date(date);
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + mm + '-' + dd;
}

function formatDayLong(isoDate) {
  var d = new Date(isoDate + 'T00:00:00');
  return IT_DAYS_LONG[d.getDay()] + ' ' + d.getDate() + ' ' + IT_MONTHS[d.getMonth()];
}

function formatWeekLabel(monday) {
  var sunday = addDays(monday, 6);
  return 'Settimana ' + monday.getDate() + '–' + sunday.getDate() + ' ' + IT_MONTHS[monday.getMonth()];
}

// ── FETCH DATA ────────────────────────────────────
function loadWeek() {
  var from = toISO(currentWeekStart);
  var to   = toISO(addDays(currentWeekStart, 6));

  renderWeekStrip(null); // show loading badges

  Supabase.fetchAppuntamenti(from, to).then(function (rows) {
    weekCache = {};
    (rows || []).forEach(function (r) {
      var dayKey = r.data_ora ? r.data_ora.slice(0, 10) : '';
      if (!weekCache[dayKey]) weekCache[dayKey] = [];
      weekCache[dayKey].push(r);
    });
    renderWeekStrip(weekCache);
    renderDayView();
  }).catch(function (err) {
    console.error('[Agenda] Fetch fallito:', err);
    showToast('Errore caricamento dati', 'error');
    renderWeekStrip({});
    renderDayView();
  });
}

// ── RENDER WEEK STRIP ─────────────────────────────
function renderWeekStrip(cache) {
  var strip   = document.getElementById('daysStrip');
  var todayS  = todayISO();
  var html    = '';

  for (var i = 0; i < 7; i++) {
    var d      = addDays(currentWeekStart, i);
    var iso    = toISO(d);
    var dayIdx = d.getDay();
    var isClosed = CLOSED_DAYS.indexOf(dayIdx) !== -1;
    var isToday  = iso === todayS;
    var isActive = iso === selectedDate;
    var count    = cache ? ((cache[iso] || []).length) : '·';

    var cls = 'day-btn';
    if (isActive)  cls += ' active';
    if (isToday)   cls += ' today';
    if (isClosed)  cls += ' closed';

    html += '<button class="' + cls + '" onclick="selectDay(\'' + iso + '\')" aria-label="' + formatDayLong(iso) + '">' +
      '<span class="day-name">' + IT_DAYS_SHORT[dayIdx] + '</span>' +
      '<span class="day-num">' + d.getDate() + '</span>' +
      '<span class="day-count">' + count + '</span>' +
      '</button>';
  }

  strip.innerHTML = html;
  document.getElementById('weekLabel').textContent = formatWeekLabel(currentWeekStart);
}

// ── RENDER DAY VIEW ───────────────────────────────
function renderDayView() {
  var container = document.getElementById('apptsList');
  var title     = document.getElementById('selectedDayTitle');
  var countLbl  = document.getElementById('apptCountLabel');

  title.textContent = formatDayLong(selectedDate);

  var appts = weekCache[selectedDate] || [];
  appts.sort(function (a, b) { return (a.data_ora || '').localeCompare(b.data_ora || ''); });

  if (!appts.length) {
    countLbl.textContent = '';
    container.innerHTML =
      '<div class="state-box">' +
      '<i class="fa-regular fa-calendar-xmark"></i>' +
      '<p>Nessun appuntamento per questo giorno.</p>' +
      '</div>';
    return;
  }

  countLbl.textContent = appts.length + (appts.length === 1 ? ' appuntamento' : ' appuntamenti');

  container.innerHTML = appts.map(function (a) {
    var ora          = a.data_ora ? a.data_ora.slice(11, 16) : '—';
    var nomeServizio = (a.servizi && a.servizi.nome) ? a.servizi.nome : '—';
    var origineIcon  = a.origine === 'Manuale' ? 'fa-pen' : 'fa-globe';
    var telHtml = a.cliente_telefono
      ? '<a class="appt-phone" href="tel:' + escHtml(a.cliente_telefono) + '"><i class="fa-solid fa-phone"></i> ' + escHtml(a.cliente_telefono) + '</a>'
      : '<span style="font-size:.78rem; color:var(--muted); opacity:.5;"><i class="fa-solid fa-bell-slash"></i> Nessun telefono — promemoria non disponibile</span>';
    var waLink  = buildWaLink(a);
    var waBtnHtml = waLink
      ? '<a href="' + waLink + '" target="_blank" rel="noopener" class="appt-btn appt-btn--wa">' +
        '<i class="fa-brands fa-whatsapp"></i> Invia promemoria</a>'
      : '';

    return '<div class="appt-card" id="card-' + a.id + '">' +
      '<div class="appt-top">' +
      '<span class="appt-time">' + escHtml(ora) + '</span>' +
      '<span class="status-pill confermato">' + escHtml(a.origine || 'Manuale') + '</span>' +
      '</div>' +
      '<p class="appt-nome">' + escHtml(a.cliente_nome) + '</p>' +
      '<p class="appt-service"><i class="fa-solid fa-scissors" style="font-size:.7rem; opacity:.5; margin-right:4px;"></i>' + escHtml(nomeServizio) + '</p>' +
      '<p style="margin-top:6px;">' + telHtml + '</p>' +
      '<p class="appt-origine"><i class="fa-solid ' + origineIcon + '" style="font-size:.65rem;"></i> inserito ' + escHtml(a.origine || 'Manuale') + '</p>' +
      '<div class="appt-actions">' +
      waBtnHtml +
      '<button class="appt-btn appt-btn--del" onclick="deleteAppt(' + a.id + ')" title="Elimina">' +
      '<i class="fa-solid fa-trash"></i> Elimina</button>' +
      '</div></div>';
  }).join('');
}

// ── ACTIONS ───────────────────────────────────────
function selectDay(iso) {
  selectedDate = iso;
  renderWeekStrip(weekCache);
  renderDayView();
}

function changeWeek(dir) {
  currentWeekStart = addDays(currentWeekStart, dir * 7);
  weekCache = {};
  loadWeek();
}

function deleteAppt(id) {
  if (!confirm('Eliminare definitivamente questo appuntamento?')) return;
  Supabase.cancellaAppuntamento(id).then(function () {
    if (weekCache[selectedDate]) {
      weekCache[selectedDate] = weekCache[selectedDate].filter(function (a) { return a.id !== id; });
    }
    renderWeekStrip(weekCache);
    renderDayView();
    showToast('Appuntamento eliminato');
  }).catch(function () {
    showToast('Errore eliminazione', 'error');
  });
}

// ── MODAL ─────────────────────────────────────────
function openAddModal() {
  var form = document.getElementById('addForm');
  form.reset();
  document.getElementById('f-data').value = selectedDate;
  document.getElementById('formError').textContent = '';
  document.getElementById('tel-preview').textContent = '';
  document.getElementById('addModal').style.display = 'flex';
  document.getElementById('f-nome').focus();
  populateServizi();
}

function closeAddModal() {
  document.getElementById('addModal').style.display = 'none';
}

function onBackdropClick(e) {
  if (e.target === document.getElementById('addModal')) closeAddModal();
}

function populateServizi() {
  Supabase.fetchServizi().then(function (rows) {
    var sel = document.getElementById('f-servizio');
    if (!rows || !rows.length) return;
    sel.innerHTML = '<option value="">— Nessun servizio selezionato —</option>' +
      rows.map(function (s) {
        return '<option value="' + escHtml(String(s.id)) + '">' + escHtml(s.nome) + '</option>';
      }).join('');
  }).catch(function () {});
}

// ── TELEFONO ──────────────────────────────────────
// Strips formatting and adds +39 prefix if no country code is present
function normalizzaTelefono(raw) {
  if (!raw) return null;
  var trimmed = raw.trim();
  if (!trimmed) return null;
  var digits = trimmed.replace(/\D/g, '');
  if (!digits) return null;
  if (trimmed.startsWith('+'))  return '+' + digits;
  if (trimmed.startsWith('00')) return '+' + digits.slice(2);
  return '+39' + digits;
}

function aggiornaPreviewTel() {
  var raw     = document.getElementById('f-tel').value;
  var preview = document.getElementById('tel-preview');
  if (!raw.trim()) { preview.textContent = ''; return; }
  var norm = normalizzaTelefono(raw);
  if (norm) {
    preview.textContent  = 'Verrà salvato come: ' + norm;
    preview.style.color  = 'var(--green)';
  } else {
    preview.textContent  = 'Numero non valido';
    preview.style.color  = 'var(--red)';
  }
}

function submitAppointment(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  var errEl = document.getElementById('formError');
  errEl.textContent = '';
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvataggio...';

  var dataVal     = document.getElementById('f-data').value;
  var oraVal      = document.getElementById('f-ora').value;
  var servizioVal = document.getElementById('f-servizio').value;
  var telVal = normalizzaTelefono(document.getElementById('f-tel').value);

  var dati = {
    cliente_nome:     document.getElementById('f-nome').value.trim(),
    data_ora:         dataVal + 'T' + oraVal + ':00',
    servizio_id:      servizioVal || null,
    cliente_telefono: telVal,
    origine:          'Manuale'
  };

  Supabase.inserisciAppuntamento(dati).then(function (result) {
    var newAppt = Array.isArray(result) ? result[0] : result;
    if (newAppt && newAppt.data_ora) {
      var dayKey = newAppt.data_ora.slice(0, 10);
      if (!weekCache[dayKey]) weekCache[dayKey] = [];
      weekCache[dayKey].push(newAppt);
    }
    renderWeekStrip(weekCache);
    if (dataVal === selectedDate) renderDayView();
    closeAddModal();
    showToast('Appuntamento aggiunto ✓', 'success');
  }).catch(function (err) {
    var msg = (err && err.message) ? err.message : 'Errore salvataggio. Riprova.';
    errEl.textContent = msg;
    console.error('[Agenda] Insert fallito:', err);
  }).finally(function () {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-calendar-plus"></i> Aggiungi appuntamento';
  });
}

// ── TOAST ─────────────────────────────────────────
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'visible' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(function () { t.className = ''; }, 3000);
}

// ── UTILS ─────────────────────────────────────────
function buildWaLink(a) {
  if (!a.cliente_telefono) return null;
  var tel  = a.cliente_telefono.replace(/\D/g, ''); // strip +, spaces
  var data = a.data_ora ? a.data_ora.slice(0, 10) : '';
  var ora  = a.data_ora ? a.data_ora.slice(11, 16) : '';
  var serv = (a.servizi && a.servizi.nome) ? a.servizi.nome : 'appuntamento';
  var dataFmt = data ? formatDayLong(data) : '';
  var msg = 'Ciao ' + a.cliente_nome + ', ti ricordiamo il tuo appuntamento per ' +
    serv + ' il giorno ' + dataFmt + ' alle ore ' + ora +
    '. A presto! Le Tentazioni';
  return 'https://wa.me/' + tel + '?text=' + encodeURIComponent(msg);
}

function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── INIT ──────────────────────────────────────────
function initAdmin() {
  // Set default date in form to today
  selectedDate = todayISO();
  // If today is a closed day, jump to nearest open day
  var todayDay = new Date().getDay();
  if (CLOSED_DAYS.indexOf(todayDay) !== -1) {
    selectedDate = toISO(addDays(new Date(), 1));
    currentWeekStart = getMondayOf(new Date(selectedDate + 'T00:00:00'));
  }
  loadWeek();
}

document.addEventListener('DOMContentLoaded', function () {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('adminApp').style.display = '';
    initAdmin();
  }
  // Keyboard: ESC closes modal
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeAddModal();
  });
});
</script>
